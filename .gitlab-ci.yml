stages:
  - quality

quality:
  stage: quality
  image: php:8.3-cli
  before_script:
    - apt-get update && apt-get install -y git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --no-progress
  script:
    - composer lint
    - composer analyse
    - composer refactor:dry
    - composer test
